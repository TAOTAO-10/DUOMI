<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常照片墙 | 多米（Domi）</title>
  <meta name="description" content="多米的日常照片墙，展示玩耍、巡视、休息和陪伴瞬间。">
  <meta name="theme-color" content="#f07f5a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="多米">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="多米首页">
      <span class="brand-mark" aria-hidden="true">ฅ</span>
      <span>多米 Domi</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="打开导航" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" aria-label="主导航">
      <a href="index.html">首页</a>
      <a href="about.html">关于多米</a>
      <a href="timeline.html">成长记录</a>
      <a href="gallery.html" aria-current="page">日常照片墙</a>
      <a href="profile.html">多米档案</a>
    </nav>
  </header>

  <main>
    <section class="page-hero gallery-hero">
      <div class="page-hero-copy reveal">
        <p class="eyebrow">Daily Gallery</p>
        <h1>日常照片墙</h1>
        <p>从王冠照到番茄玩具，从沙发巡视到安稳睡觉，这里收着多米最真实的生活小表情。</p>
      </div>
    </section>

    <section class="section gallery-section">
      <div class="gallery-grid">
        <figure class="gallery-item wide reveal">
          <img class="focus-upper" src="assets/photos/domi-crown.jpg" alt="多米戴着小王冠坐在柜前" loading="lazy">
          <figcaption>小王子登场</figcaption>
        </figure>
        <figure class="gallery-item tall reveal">
          <img class="focus-upper" src="assets/photos/domi-goodluck.jpg" alt="多米抱着红色吉祥封套" loading="lazy">
          <figcaption>抱着吉祥</figcaption>
        </figure>
        <figure class="gallery-item reveal">
          <img class="focus-center" src="assets/photos/domi-toy.jpg" alt="多米叼着番茄玩具" loading="lazy">
          <figcaption>番茄玩具</figcaption>
        </figure>
        <figure class="gallery-item reveal">
          <img class="focus-upper" src="assets/photos/domi-sofa.jpg" alt="多米站在白色沙发上" loading="lazy">
          <figcaption>沙发巡视</figcaption>
        </figure>
        <figure class="gallery-item wide reveal">
          <img class="focus-upper" src="assets/photos/domi-outfit.jpg" alt="多米穿着小衣服坐在椅子上" loading="lazy">
          <figcaption>穿上小衣服</figcaption>
        </figure>
        <figure class="gallery-item reveal">
          <img class="focus-upper" src="assets/photos/domi-nap.jpg" alt="多米侧躺睡觉" loading="lazy">
          <figcaption>困到眯眼</figcaption>
        </figure>
        <figure class="gallery-item reveal">
          <img class="focus-center" src="assets/photos/domi-mealtime.jpg" alt="多米在饭碗旁边走动" loading="lazy">
          <figcaption>饭碗旁巡逻</figcaption>
        </figure>
        <figure class="gallery-item tall reveal">
          <img class="focus-lower" src="assets/photos/domi-explorer.jpg" alt="多米钻进柜子下方缝隙探索" loading="lazy">
          <figcaption>缝隙探险</figcaption>
        </figure>
        <figure class="gallery-item reveal">
          <img class="focus-upper" src="assets/photos/domi-curious.jpg" alt="多米从沙发边露出脸看镜头" loading="lazy">
          <figcaption>歪头偷看</figcaption>
        </figure>
        <figure class="gallery-item wide reveal">
          <img class="focus-upper" src="assets/photos/domi-peek.jpg" alt="多米贴着沙发边露出半张脸" loading="lazy">
          <figcaption>半个小脑袋</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 多米（Domi）的小小主页</p>
    <a href="timeline.html">看成长记录</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
